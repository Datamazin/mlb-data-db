name: Nightly Incremental Pipeline

on:
  schedule:
    # 02:00 ET = 07:00 UTC (Mar–Nov active season)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Pipeline job to run"
        required: true
        default: "nightly_incremental"
        type: choice
        options:
          - nightly_incremental
          - roster_sync
          - standings_snapshot
          - catchup
      date:
        description: "Target date for nightly_incremental (YYYY-MM-DD, default: yesterday)"
        required: false
        default: ""
      start_date:
        description: "Start date for catchup (YYYY-MM-DD, required when job=catchup)"
        required: false
        default: ""
      end_date:
        description: "End date for catchup (YYYY-MM-DD, default: yesterday)"
        required: false
        default: ""

jobs:
  run-pipeline:
    name: ${{ inputs.job || 'nightly_incremental' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Apply schema migrations
        run: uv run python migrations/migrate.py

      - name: Run pipeline job
        run: |
          JOB="${{ inputs.job || 'nightly_incremental' }}"
          ARGS="--run $JOB"
          if [ "$JOB" = "nightly_incremental" ] && [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
          fi
          if [ "$JOB" = "catchup" ]; then
            if [ -z "${{ inputs.start_date }}" ]; then
              echo "ERROR: start_date is required for catchup job" >&2
              exit 1
            fi
            ARGS="$ARGS --start-date ${{ inputs.start_date }}"
            if [ -n "${{ inputs.end_date }}" ]; then
              ARGS="$ARGS --end-date ${{ inputs.end_date }}"
            fi
          fi
          uv run python -m src.scheduler.jobs $ARGS

      - name: Run silver transform
        if: ${{ inputs.job == '' || inputs.job == 'nightly_incremental' }}
        run: uv run python -m src.transformer.transform

      - name: Run gold aggregation
        if: ${{ inputs.job == '' || inputs.job == 'nightly_incremental' }}
        run: uv run python -m src.aggregator.aggregate

      - name: Upload mlb.duckdb artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlb-duckdb-nightly-${{ github.run_id }}
          path: data/gold/mlb.duckdb
          retention-days: 3
          if-no-files-found: warn
